<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Chat - Atendimento</title>
    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="chat.css">
</head>
<body>
    <div class="chat-container">
        <header class="chat-header">
            <div class="bot-avatar">🤖</div>
            <div class="bot-info">
                <h2>Assistente Virtual Pro</h2>
                <p>Online agora</p>
            </div>
        </header>

        <main class="chat-box" id="chat-box">
            <div class="message bot-message">
                Olá! Sou o assistente virtual. Como posso ajudar você hoje?
            </div>
        </main>

        <footer class="chat-input-area">
            <input type="text" id="user-input" placeholder="Digite sua mensagem..." autocomplete="off">
            <button id="send-btn">Enviar</button>
        </footer>
    </div>
    <script src="chat.js"></script>
</body>
</html>
